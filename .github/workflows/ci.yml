name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      # Same throwaway Postgres docker-compose.test.yml runs locally, on the same port, so
      # .env.test.example works unmodified here — CI never touches the real Neon database.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: volunteer_ops_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: cp .env.test.example .env.test

      - run: npm run db:generate
        env:
          DIRECT_URL: postgresql://postgres:postgres@localhost:5433/volunteer_ops_test

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run test:db:migrate
      - run: npm run test:db:seed
      - run: npm run test:unit

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          # Clerk's real dev instance — E2E signs in as real (namespaced, disposable) test
          # users via @clerk/testing. DATABASE_URL/DIRECT_URL are NOT set here: they come
          # from .env.test (copied above), so the app under test only ever talks to the
          # ephemeral Postgres service above, never Neon.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
