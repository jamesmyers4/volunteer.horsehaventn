name: Nightly Backup

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client and awscli
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client awscli

      - name: Neon keep-alive ping
        run: psql "${{ secrets.DATABASE_URL }}" -c "SELECT 1;"

      - name: Dump database
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          echo "TIMESTAMP=$TIMESTAMP" >> "$GITHUB_ENV"
          pg_dump "${{ secrets.DATABASE_URL }}" --format=custom --file="backup-$TIMESTAMP.dump"
          gzip "backup-$TIMESTAMP.dump"

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp "backup-$TIMESTAMP.dump.gz" \
            "s3://${{ secrets.R2_BUCKET_NAME }}/db-backups/backup-$TIMESTAMP.dump.gz" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
